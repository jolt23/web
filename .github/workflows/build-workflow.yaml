name: Build Node

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-lint-test:
    name: Build, Lint and Test
    runs-on: ubuntu-24.04
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: initialize Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: npm initialize
        run: npm ci
      - name: build
        run: npm run build --if-present
      - name: lint
        run: npm run lint
      - name: test
        run: npm test