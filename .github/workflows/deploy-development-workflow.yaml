name: Deploy Development Channel

on:
  workflow_run:
    workflows: [Build Node]
    types: [completed]

jobs:
  deploy-preview:
    name: Deploy Development Channel
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request'
    environment: development
    runs-on: ubuntu-24.04
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: initialize Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: npm initialize
        run: npm ci
      - name: build
        run: npm run build --if-present
      - name: deploy PR preview to firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PERSONAL_APP_395017 }}'
          channelId: pr-${{ github.event.workflow_run.pull_requests[0].number }}
          projectId: personal-app-395017